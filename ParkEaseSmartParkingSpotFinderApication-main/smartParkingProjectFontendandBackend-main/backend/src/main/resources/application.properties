# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
server.address=0.0.0.0

# ===============================
# DATABASE - Railway MySQL (Production) / H2 (Local Dev)
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:parkease;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.h2.console.enabled=true

# ===============================
# JACKSON / JSON
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# LOGGING (OPTIONAL BUT USEFUL)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# MAIL (FOR OTP / FORGOT PASSWORD)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
